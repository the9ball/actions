name: branch-labeler

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited # for base branch change

jobs:
  call:
    uses: the9ball/branch-labeler/.github/workflows/branch-labeler.yaml@7134883bf873facd836d9a9c2db1db70818eb338
    permissions:
      contents: write # for creating label
      pull-requests: write
    with:
      # Branch名を表す正規表現です。
      # Bashの構文に準拠します。
      branch_name_filter: "[feature|release]/.*"
